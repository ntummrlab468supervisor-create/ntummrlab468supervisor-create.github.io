    <style>
        /* 專屬於首頁相簿的「3上2下」排版樣式 */
        .gallery-section {
            padding: 2rem 0;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-top: 2rem;
        }
        
        .gallery-grid {
            display: grid;
            /* 使用 6 欄位系統來達成 3+2 的完美對齊 */
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
            margin-top: 1.5rem;
        }

        .gallery-item {
            overflow: hidden;
            border-radius: 8px;
            height: 280px; /* 稍微增加高度，讓照片更清晰 */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* 前 3 張照片：每張佔 2 個欄位 (共 6 欄) */
        .gallery-item:nth-child(-n+3) {
            grid-column: span 2;
        }

        /* 後 2 張照片：每張佔 3 個欄位 (共 6 欄) */
        .gallery-item:nth-child(n+4) {
            grid-column: span 3;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .gallery-item img:hover {
            transform: scale(1.05);
        }

        .gallery-title {
            text-align: center;
            color: #003366;
            margin-bottom: 1rem;
        }

        /* 手機版自動切換為單欄，確保閱讀體驗 */
        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }
            .gallery-item:nth-child(n) {
                grid-column: span 1;
            }
        }
    </style>
</head>
